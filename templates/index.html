<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Summarization</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #121212;
            color: #f1f1f1;
            padding-top: 50px;
        }

        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
        }

        .btn-primary {
            background-color: #3498db;
        }

        .btn-primary:hover {
            background-color: #2980b9;
        }

        .btn-danger {
            background-color: #e74c3c;
        }

        .btn-danger:hover {
            background-color: #c0392b;
        }

        textarea {
            width: 100%;
            height: 150px;
            resize: none;
            padding: 10px;
            background-color: #333;
            color: #fff;
            border: 1px solid #555;
        }

        .output {
            margin-top: 20px;
        }

        .card {
            background: #333;
            color: #fff;
            padding: 20px;
            border-radius: 8px;
            margin-top: 10px;
        }

    </style>
</head>
<body>

<div class="container">
    <h1 class="text-center">Text Summarization</h1>

    <div class="form-group">
        <label for="textInput">Enter Text</label>
        <textarea id="textInput" placeholder="Paste your text here..."></textarea>
    </div>

    <div class="form-group mt-3">
        <label for="summarySize">Summary Size:</label>
        <input type="number" id="summarySize" value="3" min="1" class="form-control">
    </div>

    <div class="text-center mt-3">
        <button id="summarizeBtn" class="btn btn-primary">Summarize</button>
        <button id="resetBtn" class="btn btn-danger">Reset</button>
    </div>

    <div id="output" class="output">
        <!-- Summarization Results Will Appear Here -->
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script>
    $(document).ready(function() {
        $('#summarizeBtn').click(function() {
            let text = $('#textInput').val();
            let numSentences = $('#summarySize').val();

            if (text.trim() === "") {
                alert("Please enter some text!");
                return;
            }

            $.ajax({
                url: 'http://127.0.0.1:5000/summarize',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ text: text, num_sentences: numSentences, max_length: 150 }),
                success: function(response) {
                    if (response.error) {
                        alert("Error: " + response.error);
                    } else {
                        let outputHTML = `
                            <div class="card">
                                <h5>Extractive Summary</h5>
                                <p>${response.extractive_summary}</p>
                            </div>
                            <div class="card">
                                <h5>Abstractive Summary</h5>
                                <p>${response.abstractive_summary}</p>
                            </div>
                        `;
                        $('#output').html(outputHTML);
                    }
                },
                error: function(xhr, status, error) {
                    alert("Error: " + (xhr.responseJSON ? xhr.responseJSON.error : "Server not responding"));
                }
            });
        });

        $('#resetBtn').click(function() {
            $('#textInput').val('');
            $('#output').empty();
        });
    });
</script>

</body>
</html>
